<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocollo 23.05</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: monospace;
}

body{
    background:black;
    overflow:hidden;
    color:#00ff88;
}

/* MATRIX BACKGROUND */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.overlay{
    position:fixed;
    inset:0;
    background:radial-gradient(circle, rgba(0,255,136,0.08), transparent 60%);
    z-index:1;
    animation:pulse 5s infinite alternate;
}

@keyframes pulse{
    from{opacity:0.4;}
    to{opacity:1;}
}

/* SCREENS */
.screen{
    position:fixed;
    inset:0;
    z-index:10;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
}

.hidden{display:none;}

.container{
    width:90%;
    max-width:900px;
    padding:40px;
    border:1px solid rgba(0,255,136,0.4);
    background:rgba(0,0,0,0.75);
}

/* TEXT */
h1{font-size:3rem;}
h2{font-size:2rem;}

p{
    font-size:1.1rem;
    line-height:1.8;
    color:#9effc9;
}

/* BUTTON */
button{
    margin-top:20px;
    padding:14px 24px;
    background:black;
    color:#00ff88;
    border:1px solid #00ff88;
    cursor:pointer;
}

/* GLITCH */
.glitch{
    animation:glitch 1s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(-2px,2px);}
    50%{transform:translate(2px,-2px);}
    75%{transform:translate(-2px,-2px);}
    100%{transform:translate(0);}
}

/* SHAKE EFFECT */
.shake{
    animation:shake 0.3s;
}

@keyframes shake{
    0%{transform:translate(0);}
    25%{transform:translate(-5px,5px);}
    50%{transform:translate(5px,-5px);}
    75%{transform:translate(-5px,-5px);}
    100%{transform:translate(0);}
}

/* FULL SCREEN GLITCH */
.glitchFlash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    z-index:999;
    pointer-events:none;
}

.glitchFlash.active{
    animation:flash 0.4s;
}

@keyframes flash{
    0%{opacity:0;}
    50%{opacity:0.6;}
    100%{opacity:0;}
}

/* SHUTDOWN */
.shutdown{
    position:fixed;
    inset:0;
    background:black;
    z-index:999;
    display:none;
    justify-content:center;
    align-items:center;
    color:red;
    font-size:2rem;
}

</style>
</head>

<body>

<!-- MATRIX -->
<canvas id="matrix"></canvas>
<div class="overlay"></div>

<!-- GLITCH FLASH -->
<div class="glitchFlash" id="flash"></div>

<!-- SHUTDOWN SCREEN -->
<div class="shutdown" id="shutdown">
SYSTEM SHUTDOWN...
</div>

<!-- ================= SCREEN 1 ================= -->
<div class="screen" id="s1">
<div class="container">

<h1>ATTENZIONE</h1>

<p>Accesso a sistema classificato.</p>

<button onclick="bootNext(1)">CONTINUA</button>

</div>
</div>

<!-- ================= SCREEN 2 ================= -->
<div class="screen hidden" id="s2">
<div class="container">

<h2 class="glitch">SCANSIONE IN CORSO...</h2>

<p>Verifica parametri completata.</p>

<button onclick="bootNext(2)">ENTRA</button>

</div>
</div>

<!-- ================= SCREEN 3 ================= -->
<div class="screen hidden" id="s3">
<div class="container">

<h2>ACCESSO AUTORIZZATO</h2>

<p>⚠ PRESENZA CONSIGLIATA ⚠</p>

<button onclick="bootNext(3)">PROSEGUI</button>

</div>
</div>

<!-- ================= SCREEN 4 ================= -->
<div class="screen hidden" id="s4">
<div class="container">

<h2>EVENTO</h2>

<p>
23 MAGGIO — 19:30<br><br>

INIZIO ANOMALIA TRA:<br>
<span id="countdown"></span>
</p>

<button onclick="bootNext(4)">CONTINUA</button>

</div>
</div>

<!-- ================= SCREEN 5 ================= -->
<div class="screen hidden" id="s5">
<div class="container">

<h1 class="glitch">TRASMISSIONE COMPLETATA</h1>

<p>La vostra presenza aumenterà il caos della serata.</p>

</div>
</div>

<!-- AUDIO -->
<audio id="bootSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8a4a00c64.mp3"></audio>
<audio id="ambient" loop src="https://cdn.pixabay.com/download/audio/2022/03/01/audio_3a5b7a5d14.mp3"></audio>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const chars="01アイウエオカキクケコ";
const font=14;
const cols=canvas.width/font;
const drops=Array(Math.floor(cols)).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff88";
ctx.font=font+"px monospace";

for(let i=0;i<drops.length;i++){
let text=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(text,i*font,drops[i]*font);

if(drops[i]*font>canvas.height&&Math.random()>0.975)drops[i]=0;
drops[i]++;
}
}
setInterval(draw,30);

/* BOOT AUDIO */
window.onload=function(){
document.getElementById("bootSound").play();
document.getElementById("ambient").play();
}

/* GLITCH FLASH */
function flash(){
let f=document.getElementById("flash");
f.classList.add("active");
setTimeout(()=>f.classList.remove("active"),400);
}

/* SHAKE */
function shake(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);
}

/* NAVIGATION */
function bootNext(n){
flash();
shake();

setTimeout(()=>{
document.getElementById("s"+n).classList.add("hidden");
document.getElementById("s"+(n+1)).classList.remove("hidden");
},200);
}

/* COUNTDOWN */
const target=new Date("2026-05-23T19:30:00");

function update(){
let now=new Date();
let d=target-now;

let days=Math.floor(d/86400000);
let h=Math.floor(d%86400000/3600000);
let m=Math.floor(d%3600000/60000);
let s=Math.floor(d%60000/1000);

document.getElementById("countdown").innerHTML=
`${days}g ${h}h ${m}m ${s}s`;
}
setInterval(update,1000);

/* FINAL SHUTDOWN (optional trigger) */
function shutdown(){
document.getElementById("shutdown").style.display="flex";
setTimeout(()=>location.reload(),3000);
}

</script>

</body>
</html>
